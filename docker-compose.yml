services:
  db:
    build:
      context: ./backend/docker/postgres
      dockerfile: Dockerfile
    container_name: skalemon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skalemon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro


  api:
    build:
      context: ./backend/skalemon-api
      dockerfile: Dockerfile
    container_name: skalemon-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_VERSION: "1.0.0"
      APP_ENV: development
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: skalemon
      DB_SSLMODE: disable
      RUN_MIGRATIONS: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data: