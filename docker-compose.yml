services:
  db:
    image: postgres:18-alpine
    container_name: skalemon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skalemon
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skalemon"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro


  api:
    build:
      context: ./backend/skalemon-api
      dockerfile: Dockerfile
    container_name: skalemon-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_VERSION: "1.0.0"
      APP_ENV: development
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: skalemon
      DB_SSLMODE: disable
      RUN_MIGRATIONS: "true"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s

  seed:
    image: postgres:18-alpine
    container_name: skalemon-seed
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./backend/docker/postgres/seed:/seed:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until psql -h db -U postgres -d skalemon -tAc "SELECT to_regclass('public.tenants')" | grep -q tenants; do
          echo "Waiting for migrated schema before seeding..."
          sleep 2
        done
        psql -h db -U postgres -d skalemon -v ON_ERROR_STOP=1 -f /seed/dev_seed.sql

volumes:
  postgres_data:
