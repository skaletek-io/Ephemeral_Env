services:

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_ENV_NAME=${PREVIEW_BRANCH_NAME:-local}
        - NEXT_PUBLIC_COMMIT_SHA=${PREVIEW_COMMIT_SHA:-local}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production

  # ─── Backend (Go) ────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://app:secret@db:5432/appdb?sslmode=disable
      - SEED_SQL_FILE=/app/backend/db/seeds/seed.sql
      - ENV=vps
    volumes:
      - ./backend/db/seeds:/app/db/seeds:ro
    depends_on:
      db:
        condition: service_healthy

  # ─── Database (Postgres) ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/seeds:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"   # exposed so you can connect with psql / TablePlus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
