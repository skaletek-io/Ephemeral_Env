services:

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_ENV_NAME=${PREVIEW_ENV_NAME:-local}
        - NEXT_PUBLIC_COMMIT_SHA=${PREVIEW_COMMIT_SHA:-local}
    restart: unless-stopped
    cpus: "${CPU_LIMIT:-0.50}"
    mem_limit: "${MEMORY_LIMIT:-512m}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-web.rule=Host(`${PREVIEW_ENV_NAME:-local}-web.${PREVIEW_BASE_DOMAIN:-preview.localhost}`)
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-web.entrypoints=websecure
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-web.tls.certresolver=le
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-web.priority=10
      - traefik.http.services.${PREVIEW_ENV_NAME:-local}-web.loadbalancer.server.port=3000
    networks:
      - default
      - traefik-public

  # ─── Backend (Go) ────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    cpus: "${CPU_LIMIT:-0.50}"
    mem_limit: "${MEMORY_LIMIT:-512m}"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://app:secret@db:5432/appdb?sslmode=disable
      - SEED_SQL_FILE=/app/db/seeds/seed.sql
      - ENV=vps
    volumes:
      - ./backend/db/seeds:/app/db/seeds:ro
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-api.rule=Host(`${PREVIEW_ENV_NAME:-local}-api.${PREVIEW_BASE_DOMAIN:-preview.localhost}`)
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-api.entrypoints=websecure
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-api.tls.certresolver=le
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-api.priority=100
      - traefik.http.services.${PREVIEW_ENV_NAME:-local}-api.loadbalancer.server.port=8080
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-web-api.rule=Host(`${PREVIEW_ENV_NAME:-local}-web.${PREVIEW_BASE_DOMAIN:-preview.localhost}`) && PathPrefix(`/api`)
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-web-api.entrypoints=websecure
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-web-api.tls.certresolver=le
      - traefik.http.routers.${PREVIEW_ENV_NAME:-local}-web-api.priority=200
    networks:
      - default
      - traefik-public

  # ─── Database (Postgres) ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    cpus: "${CPU_LIMIT:-0.50}"
    mem_limit: "${MEMORY_LIMIT:-512m}"
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/seeds:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"   # exposed so you can connect with psql / TablePlus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

networks:
  traefik-public:
    name: ${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
