name: DESTROY PREVIEW ENV

on:
  workflow_dispatch:
    inputs:
      env-name:
        description: 'Provide custom environment name (alphanumeric and dashes only)'
        required: true
        default: ''
        type: string
  issue_comment:
    types: [created]
permissions:
  issues: write

jobs:
  destroy-preview:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Resolve trigger input
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            await require(`${process.env.GITHUB_WORKSPACE}/scripts/preview/workflow/resolve_destroy_input.js`)({ core, context });

      - name: Checkout
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        uses: actions/checkout@v4

      - name: Validate required secrets
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        run: ./scripts/preview/workflow/validate_required_secrets.sh

      - name: Compute environment metadata
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        id: meta
        run: |
          ENV_NAME="$(./scripts/preview/env_name.sh "${{ steps.resolve.outputs.raw_env_name }}")"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        run: |
          ./scripts/preview/setup_ssh.sh "$VPS_HOST" "$VPS_USER" "$SSH_PRIVATE_KEY"

      - name: Destroy preview stack
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        id: destroy
        run: ./scripts/preview/workflow/destroy_preview_stack.sh "${{ steps.meta.outputs.env_name }}" "$GITHUB_OUTPUT"

      - name: Close preview issue
        if: ${{ steps.resolve.outputs.skip != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            await require(`${process.env.GITHUB_WORKSPACE}/scripts/preview/workflow/close_preview_issue.js`)({
              github,
              context,
              envName: '${{ steps.meta.outputs.env_name }}',
            });
