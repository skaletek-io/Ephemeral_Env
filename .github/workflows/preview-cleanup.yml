name: Preview Cleanup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      retention_minutes:
        description: Delete preview environments older than this many minutes
        required: false
        default: '10'

permissions:
  contents: read
  issues: write

concurrency:
  group: preview-cleanup
  cancel-in-progress: false

jobs:
  cleanup-stale-previews:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: ./scripts/preview/workflow/validate_required_secrets.sh

      - name: Resolve retention minutes
        id: config
        run: |
          RETENTION_MINUTES="${{ github.event.inputs.retention_minutes }}"
          if [ -z "$RETENTION_MINUTES" ]; then
            RETENTION_MINUTES="10"
          fi

          if ! echo "$RETENTION_MINUTES" | grep -Eq '^[0-9]+$'; then
            echo "retention_minutes must be a positive integer"
            exit 1
          fi

          if [ "$RETENTION_MINUTES" -lt 1 ]; then
            echo "retention_minutes must be >= 1"
            exit 1
          fi

          echo "retention_minutes=$RETENTION_MINUTES" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          ./scripts/preview/setup_ssh.sh "$VPS_HOST" "$VPS_USER" "$SSH_PRIVATE_KEY"

      - name: Cleanup stale previews on VPS
        id: cleanup
        run: |
          CLEANUP_OUT="$(ssh preview-vps "bash -s -- '${{ steps.config.outputs.retention_minutes }}'" < ./scripts/preview/cleanup_stale.sh)"
          echo "$CLEANUP_OUT"

          DELETED_ENVS="$(printf '%s\n' "$CLEANUP_OUT" | awk -F= '/^deleted_env=/{print $2}')"
          {
            echo "deleted_envs<<EOF"
            printf '%s\n' "$DELETED_ENVS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Close related preview issues
        if: ${{ steps.cleanup.outputs.deleted_envs != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            await require(`${process.env.GITHUB_WORKSPACE}/scripts/preview/workflow/close_stale_preview_issues.js`)({
              github,
              context,
              deletedEnvsRaw: `${{ steps.cleanup.outputs.deleted_envs }}`,
            });
