name: PR Preview Environments

on:
  # pull_request:
  #   types: [opened, synchronize, reopened, closed]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      env-name:
        description: 'Optional custom environment name (alphanumeric and dashes only)'
        required: false
        default: ''
        type: string

      back-end-ref:
        description: 'Optional backend git ref (branch, tag, or commit SHA) to deploy. Defaults to the PR branch or main if not a PR.'
        required: false
        default: 'main'
        type: string

      front-end-ref:
        description: 'Optional frontend git ref (branch, tag, or commit SHA) to deploy. Defaults to the PR branch or main if not a PR.'
        required: false
        default: 'main'
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-env-${{ github.event.ref || github.sha }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: ${{ github.event.inputs.action  == 'deploy' }}
    runs-on: ubuntu-latest
    env:
      ENV_NAME: ${{ github.event.inputs.env-name }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout backend repo
        uses: actions/checkout@v6
        with:
          repository: skaletek-io/simple-app-backend
          path: backend
          ref: ${{ github.event.inputs.back-end-ref }}

      - name: Checkout frontend repo
        uses: actions/checkout@v6
        with:
          repository: skaletek-io/simple-app-frontend
          path: frontend
          ref: ${{ github.event.inputs.front-end-ref }}

      - name: Verify file structure     
        run: |
          ls -la

          echo "==================== Backend repo files ===================="
          cd backend
          ls

          echo "==================== Frontend repo files ==================="
          cd ..
          cd frontend
          ls 

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$SSH_PRIVATE_KEY"

      - name: Compute environment metadata
        id: meta
        run: |
          ENV_NAME="$(./scripts/preview/env_name.sh "$ENV_NAME")"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          ./scripts/preview/setup_ssh.sh "$VPS_HOST" "$VPS_USER" "$SSH_PRIVATE_KEY"

      - name: Sync repo to VPS
        run: |
          ssh preview-vps "mkdir -p ~/simple-app/previews/${{ steps.meta.outputs.env_name }}"
          rsync -az --delete \
            -e "ssh -F $HOME/.ssh/config" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'frontend/node_modules' \
            ./ "preview-vps:~/simple-app/previews/${{ steps.meta.outputs.env_name }}/"

      - name: Deploy preview stack
        id: deploy
        run: |
          DEPLOY_OUT="$(ssh preview-vps "cd ~/simple-app/previews/${{ steps.meta.outputs.env_name }} && ./scripts/preview/deploy.sh '$ENV_NAME' '$VPS_HOST'")"
          echo "$DEPLOY_OUT"

          FRONTEND_URL="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^frontend_url=/{print $2}')"
          BACKEND_URL="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^backend_url=/{print $2}')"
          DB_PORT="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^db_port=/{print $2}')"
          DEPLOY_SHA="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^commit_sha=/{print $2}')"

          echo "frontend_url=$FRONTEND_URL" >> "$GITHUB_OUTPUT"
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "db_port=$DB_PORT" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Smoke test preview
        run: |
          FRONTEND_URL="${{ steps.deploy.outputs.frontend_url }}"
          BACKEND_URL="${{ steps.deploy.outputs.backend_url }}"

          for attempt in $(seq 1 12); do
            frontend_ok=0
            backend_ok=0

            if curl -fsS "$FRONTEND_URL" > /dev/null; then
              frontend_ok=1
            fi

            health_body="$(curl -fsS "$BACKEND_URL" || true)"
            if printf '%s' "$health_body" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"(ok|healthy)"'; then
              backend_ok=1
            fi

            if [[ "$frontend_ok" -eq 1 && "$backend_ok" -eq 1 ]]; then
              echo "Smoke test passed on attempt $attempt."
              exit 0
            fi

            echo "Attempt $attempt failed; retrying in 5s..."
            sleep 5
          done

          echo "Smoke test failed: preview not healthy."
          exit 1

      - name:  preview links
        # uses: actions/github-script@v7
        run: |
          echo "Name ${{ steps.meta.outputs.env_name }}"
          echo "Frontend: ${{ steps.deploy.outputs.frontend_url }}"
          echo "Backend health: ${{ steps.deploy.outputs.backend_url }}"
          echo "Postgres: ${{ secrets.VPS_HOST }}:${{ steps.deploy.outputs.db_port }}"

      # - name: Comment preview failure
      #   if: failure()
      #   uses: actions/github-script@v7
      #   with:
      #     script: |
      #       const { upsertPrComment } = require('./scripts/preview/upsert_pr_comment');
      #       const marker = '<!-- preview-env-status -->';
      #       const frontendUrl = `${{ steps.deploy.outputs.frontend_url }}`.trim() || 'not available';
      #       const backendUrl = `${{ steps.deploy.outputs.backend_url }}`.trim() || 'not available';
      #       const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
      #       const body = [
      #         marker,
      #         `Preview deployment failed for branch \`${{ steps.meta.outputs.env_name }}\`.`,
      #         '',
      #         `- Logs: ${runUrl}`,
      #         `- Frontend (if created): ${frontendUrl}`,
      #         `- Backend (if created): ${backendUrl}`,
      #       ].join('\n');

      #       await upsertPrComment({ github, context, marker, body });

  destroy-preview:
    if: ${{ github.event.inputs.action  == 'destroy' }}
    runs-on: ubuntu-latest
    env:
      ENV_NAME: ${{ github.event.inputs.env-name }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$SSH_PRIVATE_KEY"

      - name: Compute environment metadata
        id: meta
        run: |
          ENV_NAME="$(./scripts/preview/env_name.sh "$ENV_NAME")"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          ./scripts/preview/setup_ssh.sh "$VPS_HOST" "$VPS_USER" "$SSH_PRIVATE_KEY"

      - name: Destroy preview stack
        id: destroy
        run: |
          DESTROY_OUT="$(ssh preview-vps "
            set -e
            PREVIEW_DIR=\"\$HOME/simple-app/previews/${{ steps.meta.outputs.env_name }}\"
            if [ -d \"\$PREVIEW_DIR\" ]; then
              echo \"[preview-destroy] Found preview directory: \$PREVIEW_DIR\"
              cd \"\$PREVIEW_DIR\"
              ./scripts/preview/destroy.sh '$ENV_NAME'
              cd /
              sudo rm -rf \"\$PREVIEW_DIR\"
              echo 'preview_dir_removed=true'
            else
              echo '[preview-destroy] No preview directory found; nothing to destroy.'
              echo 'preview_dir_removed=false'
            fi
          ")"
          echo "$DESTROY_OUT"

          DESTROYED_ENV="$(printf '%s\n' "$DESTROY_OUT" | awk -F= '/^destroyed_env=/{print $2}' | tail -n1)"
          PROJECT_NAME="$(printf '%s\n' "$DESTROY_OUT" | awk -F= '/^project_name=/{print $2}' | tail -n1)"
          PREVIEW_DIR_REMOVED="$(printf '%s\n' "$DESTROY_OUT" | awk -F= '/^preview_dir_removed=/{print $2}' | tail -n1)"

          echo "destroyed_env=$DESTROYED_ENV" >> "$GITHUB_OUTPUT"
          echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "preview_dir_removed=$PREVIEW_DIR_REMOVED" >> "$GITHUB_OUTPUT"

      # - name: Comment cleanup status
