name: PR Preview Environments

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      COMMIT_SHA: ${{ github.sha }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$SSH_PRIVATE_KEY"

      - name: Compute environment metadata
        id: meta
        run: |
          ENV_NAME="$(./scripts/preview/env_name.sh "$BRANCH_NAME")"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          ./scripts/preview/setup_ssh.sh "$VPS_HOST" "$VPS_USER" "$SSH_PRIVATE_KEY"

      - name: Sync repo to VPS
        run: |
          ssh preview-vps "mkdir -p ~/simple-app/previews/${{ steps.meta.outputs.env_name }}"
          rsync -az --delete \
            -e "ssh -F $HOME/.ssh/config" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'frontend/node_modules' \
            ./ "preview-vps:~/simple-app/previews/${{ steps.meta.outputs.env_name }}/"

      - name: Deploy preview stack
        id: deploy
        run: |
          DEPLOY_OUT="$(ssh preview-vps "cd ~/simple-app/previews/${{ steps.meta.outputs.env_name }} && ./scripts/preview/deploy.sh '$BRANCH_NAME' '$VPS_HOST' '$COMMIT_SHA'")"
          echo "$DEPLOY_OUT"

          FRONTEND_URL="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^frontend_url=/{print $2}')"
          BACKEND_URL="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^backend_url=/{print $2}')"
          DB_PORT="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^db_port=/{print $2}')"
          DEPLOY_SHA="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^commit_sha=/{print $2}')"

          echo "frontend_url=$FRONTEND_URL" >> "$GITHUB_OUTPUT"
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "db_port=$DB_PORT" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Comment preview links
        uses: actions/github-script@v7
        with:
          script: |
            const { upsertPrComment } = require('./scripts/preview/upsert_pr_comment');
            const marker = '<!-- preview-env-status -->';
            const body = [
              marker,
              `Preview environment updated for branch \`${{ steps.meta.outputs.env_name }}\`.`,
              '',
              `- Frontend: ${{ steps.deploy.outputs.frontend_url }}`,
              `- Backend health: ${{ steps.deploy.outputs.backend_url }}`,
              `- Postgres: ${{ secrets.VPS_HOST }}:${{ steps.deploy.outputs.db_port }}`,
              `- Commit: \`${{ steps.deploy.outputs.commit_sha }}\``,
            ].join('\n');

            await upsertPrComment({ github, context, marker, body });

  destroy-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$SSH_PRIVATE_KEY"

      - name: Compute environment metadata
        id: meta
        run: |
          ENV_NAME="$(./scripts/preview/env_name.sh "$BRANCH_NAME")"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          ./scripts/preview/setup_ssh.sh "$VPS_HOST" "$VPS_USER" "$SSH_PRIVATE_KEY"

      - name: Destroy preview stack
        run: |
          ssh preview-vps "
            set -e
            PREVIEW_DIR=\"\$HOME/simple-app/previews/${{ steps.meta.outputs.env_name }}\"
            if [ -d \"\$PREVIEW_DIR\" ]; then
              cd \"\$PREVIEW_DIR\"
              ./scripts/preview/destroy.sh '$BRANCH_NAME'
              cd /
              rm -rf \"\$PREVIEW_DIR\"
            else
              echo 'No preview directory found; nothing to destroy.'
            fi
          "

      - name: Comment cleanup status
        uses: actions/github-script@v7
        with:
          script: |
            const { upsertPrComment } = require('./scripts/preview/upsert_pr_comment');
            const marker = '<!-- preview-env-status -->';
            const body = [
              marker,
              `Preview environment \`${{ steps.meta.outputs.env_name }}\` was removed after PR close.`,
            ].join('\n');

            await upsertPrComment({ github, context, marker, body });
