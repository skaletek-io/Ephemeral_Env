name: PR Preview Environments

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$SSH_PRIVATE_KEY"

      - name: Compute environment metadata
        id: meta
        run: |
          safe_name() {
            echo "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g' \
              | sed -E 's/^-+|-+$//g' \
              | cut -c1-40
          }

          ENV_NAME="$(safe_name "$BRANCH_NAME")"
          if [ -z "$ENV_NAME" ]; then
            echo "Could not compute env name from branch: $BRANCH_NAME"
            exit 1
          fi

          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          SSH_KEY="${SSH_PRIVATE_KEY//$'\r'/}"
          SSH_KEY="${SSH_KEY//\\n/$'\n'}"
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host preview-vps
            HostName $VPS_HOST
            User $VPS_USER
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            BatchMode yes
            PreferredAuthentications publickey
            PasswordAuthentication no
            ConnectTimeout 10
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
          ssh preview-vps "echo SSH auth ok"

      - name: Sync repo to VPS
        run: |
          ssh preview-vps "mkdir -p ~/simple-app/previews/${{ steps.meta.outputs.env_name }}"
          rsync -az --delete \
            -e "ssh -F $HOME/.ssh/config" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'frontend/node_modules' \
            ./ "preview-vps:~/simple-app/previews/${{ steps.meta.outputs.env_name }}/"

      - name: Deploy preview stack
        id: deploy
        run: |
          DEPLOY_OUT="$(ssh preview-vps "cd ~/simple-app/previews/${{ steps.meta.outputs.env_name }} && ./scripts/preview/deploy.sh '$BRANCH_NAME' '$VPS_HOST'")"
          echo "$DEPLOY_OUT"

          FRONTEND_URL="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^frontend_url=/{print $2}')"
          BACKEND_URL="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^backend_url=/{print $2}')"
          DB_PORT="$(printf '%s\n' "$DEPLOY_OUT" | awk -F= '/^db_port=/{print $2}')"

          echo "frontend_url=$FRONTEND_URL" >> "$GITHUB_OUTPUT"
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "db_port=$DB_PORT" >> "$GITHUB_OUTPUT"

      - name: Comment preview links
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              `Preview environment updated for branch \`${{ steps.meta.outputs.env_name }}\`.`,
              '',
              `- Frontend: ${{ steps.deploy.outputs.frontend_url }}`,
              `- Backend health: ${{ steps.deploy.outputs.backend_url }}`,
              `- Postgres: ${{ secrets.VPS_HOST }}:${{ steps.deploy.outputs.db_port }}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  destroy-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$SSH_PRIVATE_KEY"

      - name: Compute environment metadata
        id: meta
        run: |
          safe_name() {
            echo "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g' \
              | sed -E 's/^-+|-+$//g' \
              | cut -c1-40
          }

          ENV_NAME="$(safe_name "$BRANCH_NAME")"
          if [ -z "$ENV_NAME" ]; then
            echo "Could not compute env name from branch: $BRANCH_NAME"
            exit 1
          fi

          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          SSH_KEY="${SSH_PRIVATE_KEY//$'\r'/}"
          SSH_KEY="${SSH_KEY//\\n/$'\n'}"
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host preview-vps
            HostName $VPS_HOST
            User $VPS_USER
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            BatchMode yes
            PreferredAuthentications publickey
            PasswordAuthentication no
            ConnectTimeout 10
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
          ssh preview-vps "echo SSH auth ok"

      - name: Destroy preview stack
        run: |
          ssh preview-vps "
            set -e
            PREVIEW_DIR=\"\$HOME/simple-app/previews/${{ steps.meta.outputs.env_name }}\"
            if [ -d \"\$PREVIEW_DIR\" ]; then
              cd \"\$PREVIEW_DIR\"
              ./scripts/preview/destroy.sh '$BRANCH_NAME'
              cd /
              rm -rf \"\$PREVIEW_DIR\"
            else
              echo 'No preview directory found; nothing to destroy.'
            fi
          "

      - name: Comment cleanup status
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Preview environment \`${{ steps.meta.outputs.env_name }}\` was removed after PR close.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
