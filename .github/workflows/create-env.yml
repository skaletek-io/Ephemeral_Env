name: CREATE or UPDATE PREVIEW ENV

on:
  workflow_dispatch:
    inputs:
      env-name:
        description: 'Custom environment name (alphanumeric and dashes only)'
        required: true
        default: ''
        type: string

      back-end-ref:
        description: 'Optional backend git ref (branch) to deploy. Defaults to main branch if not provided.'
        required: false
        default: 'main'
        type: string

      front-end-ref:
        description: 'Optional frontend git ref (branch, tag, or commit SHA) to deploy. Defaults to main branch if provided.'
        required: false
        default: 'main'
        type: string

      cpu-limit:
        description: 'CPU limit per preview container (example: 0.50, 1.00, 2.00)'
        required: false
        default: '0.50'
        type: string

      memory-limit:
        description: 'Memory limit per preview container (example: 512m, 1g, 2g)'
        required: false
        default: '512m'
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: preview-env-${{ github.event.ref || github.sha }}
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      ENV_NAME: ${{ github.event.inputs.env-name }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
      PREVIEW_BASE_DOMAIN: ${{ secrets.PREVIEW_BASE_DOMAIN }}
      REQUIRE_PREVIEW_DOMAIN: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout backend repo
        uses: actions/checkout@v6
        with:
          repository: skaletek-io/simple-app-backend
          path: backend
          ref: ${{ github.event.inputs.back-end-ref }}

      - name: Checkout frontend repo
        uses: actions/checkout@v6
        with:
          repository: skaletek-io/simple-app-frontend
          path: frontend
          ref: ${{ github.event.inputs.front-end-ref }}

      - name: Validate required secrets
        run: ./scripts/preview/workflow/validate_required_secrets.sh

      - name: Compute environment metadata
        id: meta
        run: |
          ENV_NAME="$(./scripts/preview/env_name.sh "$ENV_NAME")"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          ./scripts/preview/setup_ssh.sh "$VPS_HOST" "$VPS_USER" "$SSH_PRIVATE_KEY"

      - name: Sync repo to VPS
        run: ./scripts/preview/workflow/sync_repo_to_vps.sh "${{ steps.meta.outputs.env_name }}"

      - name: Deploy preview stack
        id: deploy
        run: ./scripts/preview/workflow/deploy_preview_stack.sh "${{ steps.meta.outputs.env_name }}" "$PREVIEW_BASE_DOMAIN" "${{ github.event.inputs.cpu-limit }}" "${{ github.event.inputs.memory-limit }}" "$GITHUB_OUTPUT"

      - name: Smoke test preview
        run: ./scripts/preview/workflow/smoke_test_preview.sh "${{ steps.deploy.outputs.frontend_url }}" "${{ steps.deploy.outputs.backend_url }}"

      - name: Create or update preview issue
        uses: actions/github-script@v7
        with:
          script: |
            await require(`${process.env.GITHUB_WORKSPACE}/scripts/preview/workflow/upsert_preview_issue.js`)({
              github,
              context,
              envName: '${{ steps.meta.outputs.env_name }}',
              frontendUrl: '${{ steps.deploy.outputs.frontend_url }}',
              backendUrl: '${{ steps.deploy.outputs.backend_url }}',
              dbPort: '${{ steps.deploy.outputs.db_port }}',
              vpsHost: '${{ secrets.VPS_HOST }}',
              actor: '${{ github.actor }}',
              runUrl: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              backRef: '${{ github.event.inputs.back-end-ref }}',
              frontRef: '${{ github.event.inputs.front-end-ref }}',
            });
